<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>User Management</h1>
    <p class="subtitle">DecodeLabs Project 4 — Full Stack Integration</p>

    <!-- Add User Form -->
    <div class="card">
      <h2>Add New User</h2>
      <div class="form-group">
        <input type="text" id="name" placeholder="Full Name" />
        <input type="email" id="email" placeholder="Email Address" />
        <input type="number" id="age" placeholder="Age" />
        <button onclick="addUser()">Add User</button>
      </div>
      <p id="form-message" class="message"></p>
    </div>

    <!-- Users List -->
    <div class="card">
      <h2>All Users <span id="user-count"></span></h2>
      <div id="users-container">
        <p class="loading">Loading users...</p>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000/users';

    // ── FETCH & DISPLAY ALL USERS ──────────────────────────
    async function loadUsers() {
      const container = document.getElementById('users-container');
      const countEl = document.getElementById('user-count');

      try {
        const response = await fetch(API);
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

        const users = await response.json();
        countEl.textContent = `(${users.length})`;

        if (users.length === 0) {
          container.innerHTML = '<p class="empty">No users found. Add one above!</p>';
          return;
        }

        container.innerHTML = users.map(user => `
          <div class="user-card" id="user-${user.id}">
            <div class="user-info">
              <h3>${user.name}</h3>
              <p>${user.email}</p>
              <span class="badge">Age: ${user.age}</span>
            </div>
            <button class="edit-btn" onclick="openEdit(${user.id}, '${user.name}', '${user.email}', ${user.age})">Edit</button>
            <button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button>
          </div>
        `).join('');

      } catch (error) {
        container.innerHTML = `<p class="error">Failed to load users. Is the server running?</p>`;
        console.error(error);
      }
    }

    // ── ADD USER ───────────────────────────────────────────
    async function addUser() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const age = parseInt(document.getElementById('age').value);
      const msgEl = document.getElementById('form-message');

      // Frontend validation
      if (!name || !email || !age) {
        showMessage('All fields are required.', 'error');
        return;
      }

      try {
        const response = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, age })
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || 'Failed to add user.', 'error');
          return;
        }

        showMessage(`User "${data.name}" added successfully!`, 'success');
        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
        document.getElementById('age').value = '';
        loadUsers();

      } catch (error) {
        showMessage('Server error. Try again.', 'error');
        console.error(error);
      }
    }

    // ── DELETE USER ────────────────────────────────────────
    async function deleteUser(id) {
      if (!confirm('Are you sure you want to delete this user?')) return;

      try {
        const response = await fetch(`${API}/${id}`, { method: 'DELETE' });

        if (!response.ok) {
          alert('Failed to delete user.');
          return;
        }

        // Remove from DOM instantly
        document.getElementById(`user-${id}`).remove();

        // Update count
        const countEl = document.getElementById('user-count');
        const current = parseInt(countEl.textContent.replace(/\D/g, '')) - 1;
        countEl.textContent = `(${current})`;

      } catch (error) {
        alert('Server error. Try again.');
        console.error(error);
      }
    }

    // ── HELPER ─────────────────────────────────────────────
    function showMessage(text, type) {
      const el = document.getElementById('form-message');
      el.textContent = text;
      el.className = `message ${type}`;
      setTimeout(() => { el.textContent = ''; el.className = 'message'; }, 4000);
    }

    // Load on page start
    loadUsers();

    // --─ EDIT USER FUNCTIONALITY (BONUS) ─────────────────────

    // ── EDIT USER ──────────────────────────────────────────
function openEdit(id, name, email, age) {
  const card = document.getElementById(`user-${id}`);
  card.innerHTML = `
    <div class="edit-form">
      <input type="text" id="edit-name-${id}" value="${name}" placeholder="Full Name"/>
      <input type="email" id="edit-email-${id}" value="${email}" placeholder="Email"/>
      <input type="number" id="edit-age-${id}" value="${age}" placeholder="Age"/>
      <div class="btn-group">
        <button class="edit-btn" onclick="saveEdit(${id})">Save</button>
        <button class="delete-btn" onclick="loadUsers()">Cancel</button>
      </div>
    </div>
  `;
}

async function saveEdit(id) {
  const name  = document.getElementById(`edit-name-${id}`).value.trim();
  const email = document.getElementById(`edit-email-${id}`).value.trim();
  const age   = parseInt(document.getElementById(`edit-age-${id}`).value);

  if (!name || !email || !age) {
    alert('All fields are required.');
    return;
  }

  try {
    const response = await fetch(`${API}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, age })
    });

    const data = await response.json();

    if (!response.ok) {
      alert(data.error || 'Failed to update user.');
      return;
    }

    loadUsers();

  } catch (error) {
    alert('Server error. Try again.');
    console.error(error);
  }
}
  </script>
</body>
</html>
